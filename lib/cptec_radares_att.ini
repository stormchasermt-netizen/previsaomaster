--------------------------------------------------------------------------------
3. HORÁRIO EXIBIDO E QUADRO "ATUAL"
--------------------------------------------------------------------------------

O utilitário getInfoDateTime percorre imagens[] e escolhe a primeira cujo
"horario" seja <= ao tempo atual do app. Se o atraso for > 1 hora (3600000 ms)
em relação ao relógio do cliente, pode tratar como indisponível para exibição.

O rodapé usa formatHourMinute sobre componentes.common.currentTime (ajuste de
fuso no próprio JS).


--------------------------------------------------------------------------------
4. ANIMAÇÃO (TIMELINE)
--------------------------------------------------------------------------------

No data do Vue, animacao.horarios é uma lista FIXA de rótulos de -1h a +1h em
passos de 5 minutos (25 posições). O índice animacao.index (padrão 13 = "agora")
ao mudar dispara atualizarCamadas(), que redesenha as camadas.

Lista exata (HTML):
  ["-1h","-55'","-50'","-45'","-40''","-35'","-30'","-25'","-20'","-15'","-10'","-5'","0h",]

A animação usa os quadros já carregados pela API (parâmetro quantidade),
alinhados a essa linha do tempo relativa.


(b) Padrão de URL no CDN
    Pastas por ano/mês e nomes do tipo:
      R{identificador_composto}_{YYYYMMDDHHmm}.png
    Hosts típicos: https://s0.cptec.inpe.br/ ... https://s3.cptec.inpe.br/
    Path exemplo: /radar/cemaden/{site}/.../YYYY/MM/arquivo.png



--------------------------------------------------------------------------------
6. REFRESH
--------------------------------------------------------------------------------

Intervalo de atualização do mapa (app): aproximadamente a cada 10 minutos
(setInterval no HTML).


