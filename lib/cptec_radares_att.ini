================================================================================
  NOWCASTING CPTEC/INPE — RADARES: API, IDs, COORDENADAS, BOUNDS, VARIÁVEIS
  Referência: https://nowcasting.cptec.inpe.br/#
  Documento gerado a partir do HTML/JS do site e chamadas à API (março/2026)
================================================================================

NOTA SOBRE EXPLORAÇÃO
---------------------
O navegador integrado da IDE pode falhar com erros de script; a análise foi feita
pelo HTML da página, pelos bundles JS servidos pelo site e por requisições HTTP
reais à API.


--------------------------------------------------------------------------------
1. ARQUITETURA NO FRONT-END
--------------------------------------------------------------------------------

| Recurso          | Onde aparece |
|------------------|--------------|
| Mapa             | OpenLayers 5, projeção EPSG:4326, fundo OSM |
| contextPath      | https://nowcasting.cptec.inpe.br/ (definido no HTML) |
| Lista de radares | Array app.radares = [...] embutido no HTML (não vem de endpoint na carga) |
| API de imagens   | GET {contextPath}api/camadas/radar/{id}/imagens |
| Outras APIs      | Modelo: .../api/camadas/modelo; Satélite: .../api/camadas/satelite |
|                  | Referências também a previsaonumerica.cptec.inpe.br |

Config no HTML (Vue data.config):
  servidor.modelo e servidor.radar: https://s0.cptec.inpe.br/ioper/produtos
  api.modelo e api.radar: https://previsaonumerica.cptec.inpe.br/api/
  api.dadosobservados: https://tempo.cptec.inpe.br/avisos/admin/api/

Chamada principal (radar.js / bundle):
  GET https://nowcasting.cptec.inpe.br/api/camadas/radar/{id}/imagens?quantidade=10&nome={nome}

O parâmetro "nome" deve coincidir EXATAMENTE com o nome no menu (acentos e espaços).
Se estiver incorreto, a API pode devolver [].


--------------------------------------------------------------------------------
2. COORDENADAS, RAIO E BOUNDS
--------------------------------------------------------------------------------

Cada radar no HTML possui:

  id         — identificador numérico usado na URL da API (ex.: 8345).
  raio       — string em quilometros (ex.: "250", "500", "480", "400").
               No mapa vira um círculo em torno do centro (escala em km).
  coordenadas — string JSON com 6 números:
               [minLon, minLat, maxLon, maxLat, centerLon, centerLat]
               Canto SW, canto NE e CENTRO usado para centralizar o mapa
               (no código, índices 4 e 5 = lon/lat do centro).

Cada IMAGEM devolvida pela API traz:

  boundingBox — [minLon, minLat, maxLon, maxLat] em graus (extensão da imagem).
  horario     — instante em MILISSEGUNDOS (epoch Unix) daquele quadro.
  fileDate    — data (ex.: "2024-12-19")
  fileTime    — hora (ex.: "16:10:00") — uso observado em UTC no payload.
  url         — URL direta do PNG.
  urls        — espelhos em s0–s3.cptec.inpe.br (mesmo path).

Estrutura típica de um PRODUTO na resposta JSON:

  formato      — PNG, TXT (centróides), etc.
  produto      — CAPPI, PPI, Doppler, VIL, DVIL, Echotop, Chuva 24hrs, etc.
  id           — identificador do subproduto (ex.: R12544964).
  descricao    — texto explicativo.
  instrumento  — nome do radar.
  fase         — fase da tempestade / categoria.
  localizacao  — path interno no servidor (referência).
  frequencia   — intervalo em minutos (string).
  imagens[]    — lista de quadros com url, boundingBox, horario, etc.
  arquivos[]   — para produtos TXT (centróides).

--------------------------------------------------------------------------------
2A. TABELA COMPLETA — POR RADAR E PRODUTO (API .../imagens, coleta mar/2026)
--------------------------------------------------------------------------------

Fonte: GET https://nowcasting.cptec.inpe.br/api/camadas/radar/{id}/imagens?quantidade=1&nome={nome}

Cada linha = uma combinação (radar, produto). Colunas (TSV):
  id_radar | nome_radar | id_produto | instrumento | produto | formato | frequencia_min | fase | localizacao

Campos por IMAGEM (variáveis no tempo; não são colunas fixas por radar):
  boundingBox, horario, fileDate, fileTime, url, urls — vêm de cada item de imagens[] dentro do produto.

